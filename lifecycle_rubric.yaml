schema_version: 1
source_doc: docs/world_generation_lifecycle.md
phases:
- name: Phase 1 — Skeleton (procedural)
  id: phase_1_skeleton_procedural
  corpus: draft
  corpus_path: task-designer/drafts/
  stages:
  - name: Stage 1 — Objective
    id: stage_1_objective
    summary: Picks the task type (1–N) from `tables/goal_decompositions.yaml` or accepts a grounded one.
    files:
    - stages/s01_objective.py
    - tables/goal_decompositions.yaml`.
    checks:
    - id: exists_in_closed_set
      scope: per-task
      what: '`task_type_id` exists in `tables/goal_decompositions.yaml` (closed set).'
      why: An unrecognized `task_type_id` means downstream stages have no decomposition rows to expand against, so subgoal/edge-pattern
        lookups silently fall back to empty lists and the entire task corpus skeleton collapses.
      suggestion: Validate `task_type_id` against the loaded `tables/goal_decompositions.yaml` key set at the top of stage
        1 and hard-fail with the offending value.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 1 (Objective). It reads the `task_type_id` field that Stage
        1 writes to `task-designer/drafts/<task>/stage_01.json` and verifies that ID exists as a row in `tables/goal_decompositions.yaml`.
        A task lands here when it was authored from an opt-in grounding file under `task-designer/grounding/<name>.yaml` that
        supplies its own objective directly, bypassing the closed-set lookup entirely — there is no `task_type_id` for the
        check to validate.
      code: S1C1
      script: audit/scripts/s01_objective.py::exists_in_closed_set
    - id: 20_chars_and_names_at_least_one_concrete_entity_kind
      scope: per-task
      what: '`description` ≥ 20 chars and names at least one concrete entity kind from the gym''s schema.'
      why: A vague objective (e.g. "do the thing") can't be matched to a concrete entity kind by stage 2's goal expansion,
        producing goals that point at nothing the gym can render or grade.
      suggestion: Add a regex/entity-kind sniff on `description` against the gym's schema enum and reject objectives that
        don't name at least one entity.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 1 (Objective). It reads the `description` string in `stage_01.json`
        and enforces a length + entity-kind floor. A task lands here when its objective is inherited verbatim from a grounding
        file (opt-in input under `task-designer/grounding/`) and never re-emitted by Stage 1, so there is no Stage-1-authored
        description for the rubric to measure.
      code: S1C2
      script: audit/scripts/s01_objective.py::description_floor_and_entity_kind
    - id: when_grounded_the_grounding_file_s_matches_stage
      scope: per-task
      what: When grounded, the grounding file's `objective.task_type_id` matches stage output exactly.
      why: Drift between grounding's `task_type_id` and the stage output means downstream stages run a different decomposition
        than the grounding promised, breaking goldens that assume the grounded type.
      suggestion: When grounded, short-circuit stage 1 to copy `objective.task_type_id` verbatim from the grounding file and
        assert equality before returning.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 1 (Objective). It cross-references `task-designer/grounding/<name>.yaml`'s
        `objective.task_type_id` against `stage_01.json`'s emitted value. A task lands here when it was generated purely procedurally
        with no grounding file at all (grounding is an opt-in input) — there is nothing to cross-reference.
      code: S1C3
    - id: stage_is_deterministic_running_twice_with_the_same
      scope: per-stage
      what: 'Stage is deterministic: running twice with the same inputs produces identical output.'
      why: 'Non-determinism here cascades: every later stage seeded from this output produces a different DAG/reward set per
        run, making regeneration drift goldens and breaking reproducibility of evidence pointers.'
      suggestion: Make all randomness in stage 1 derive from the explicit `seed` (no `time.time()`, no unsorted dict iteration)
        and add a self-diff test that runs the stage twice.
      code: S1C4
      script: audit/scripts/s01_objective.py::stage_is_deterministic_running_twice
    code: S1
  - name: Stage 2 — Goals
    id: stage_2_goals
    summary: 'Expands the objective into a goal list. Enforces the **UI-required** invariant: at least one goal must require
      browser interaction.'
    files:
    - stages/s02_goals.py
    - models/goals.py`.
    checks:
    - id: task_emits_at_least_one_goal
      scope: per-task
      what: Stage 2 emits at least one goal — the task has something to decompose into subgoals/edges/rewards downstream.
      why: A task with zero goals starves stages 3–6 — no subgoals, no DAG, no action matrix, no rewards. The grader has nothing
        to evaluate, so the task is unscorable by construction. This is the floor that the goal_count_band and UI-required
        checks rely on being true.
      suggestion: Assert `len(stage_02.json['goals']) >= 1` at stage 2 exit; reject the task with the offending row in `tables/goal_decompositions.yaml`.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It opens `task-designer/drafts/<task>/stage_02.json`
        and reads the `goal_graph.goals[]` list. A task lands here when no draft Stage 2 artifact exists for it — most commonly
        because the task is a SHIPPED world under `task-designer/worlds/` (already past Stage 2, its draft folder may have
        been cleaned up), or because the audit recorded the same draft under a different ID label (e.g. `003` vs `task_003`)
        and the dedup didn't merge them. Tasks that genuinely reached Stage 2 and emitted zero goals would appear as FAIL,
        not N/A.
      code: S2C1
      script: audit/scripts/floor_checks.py::task_emits_at_least_one_goal
    - id: all_goal_ids_are_unique_within_the_task
      scope: per-task
      what: All goal IDs are unique within the task.
      why: Duplicate goal IDs cause stage 3's `parent_id` lookups and stage 4's edges to bind to the wrong goal, silently
        merging two semantically distinct goals into one grader target.
      suggestion: Collect goal IDs into a set as they're emitted in stage 2 and raise on first collision, namespacing IDs
        by `task_id` if needed.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It reads the `goals[].id` values in `stage_02.json`
        and confirms no two are equal. A task lands here when Stage 2 emitted zero or one goal, making uniqueness structurally
        vacuous (no pair exists to collide).
      code: S2C2
      script: audit/scripts/s02_goals.py::all_goal_ids_are_unique_within_the_task
    - id: goal_count_is_within_band
      scope: per-task
      what: Goal count is within `config.structure.goal_count` band.
      why: 'Out-of-band goal counts break the difficulty contract: too few yields trivial tasks that pass without exploration,
        too many produce unsolvable timeouts and skew the pass-rate target.'
      suggestion: Clamp/reject goal counts against `config.structure.goal_count` immediately after expansion and log which
        decomposition row caused the drift.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It compares `len(stage_02.goals)` against the
        `config.structure.goal_count` band declared in the task's config. A task lands here when its config omits a `structure.goal_count`
        band — goal counts are then open-ended by design and no band exists to enforce.
      code: S2C3
      script: audit/scripts/s02_goals.py::goal_count_is_within_band
    - id: every_is_a_member_of_the_closed_enum
      scope: per-task
      what: Every `Goal.type` is a member of the closed `GoalType` enum.
      why: An unknown `Goal.type` means later stages (action matrix, reward declarations) have no handler, so the goal is
        silently skipped and its rewards never compile — agent gets free credit or grader is empty.
      suggestion: Validate `Goal.type` against the `GoalType` enum at stage 2 exit; reject the task rather than the goal so
        the bad decomposition is fixed.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It reads each `goals[].type` field in `stage_02.json`
        and validates it against the closed `GoalType` enum in `models/goals.py`. A task lands here when it uses a schema
        variant where goals are untyped (no `type` field emitted), so there is nothing to enum-check.
      code: S2C4
      script: audit/scripts/s02_goals.py::every_goal_type_in_closed_enum
    - id: at_least_one_goal_is_ui_required_matches_the_same
      scope: per-task
      what: At least one goal is UI-required (matches the same predicate `_ensure_ui_required()` uses).
      why: Without a UI-required goal, the task is solvable purely via API/CLI and the browser-CUA premise is broken — the
        gym is no longer testing what it claims to test.
      suggestion: Call the same `_ensure_ui_required()` predicate used at runtime as a post-stage-2 assertion; do not paraphrase
        its logic.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It re-runs the same `_ensure_ui_required()` predicate
        Stage 2 uses against `stage_02.json` to confirm at least one goal requires browser interaction. A task lands here
        when its config explicitly marks it as headless or CLI-only, disabling the UI-required invariant by design.
      code: S2C5
    - id: every_goal_references_at_least_one_entity_kind
      scope: per-task
      what: Every goal references at least one entity kind declared in the gym's closed world schema.
      why: Goals that don't name a schema entity can't be hydrated to concrete world objects, so stage 5's action matrix has
        nothing to bind verbs to and the goal becomes ungradable.
      suggestion: Cross-check each goal's referenced kinds against the gym's closed-world schema enum and fail-fast at stage
        2 exit.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It walks each goal in `stage_02.json` and confirms
        it binds to at least one entity kind declared in the gym's closed-world schema. A task lands here when its goals are
        pure-reasoning (e.g. Q&A only) and intentionally declare no entity binding — there is no `entities` field to inspect.
      code: S2C6
    - id: when_grounded_every_grounding_supplied_goal_id_appears
      scope: per-task
      what: When grounded, every grounding-supplied goal ID appears in the output unchanged.
      why: Dropping or renaming a grounding-supplied goal ID silently invalidates every downstream evidence pointer keyed
        on that ID, producing a task that grades against a different goal set than the grounding describes.
      suggestion: When grounded, treat grounding goals as immutable and only allow stage 2 to append new procedural goals;
        assert ID-set superset relation.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 2 (Goals). It diffs the `goals[].id` set in `task-designer/grounding/<name>.yaml`
        against the IDs in `stage_02.json` to confirm Stage 2 preserved them verbatim. A task lands here when no grounding
        file exists (grounding is opt-in) — Stage 2 generated the goal IDs procedurally and there is nothing to compare against.
      code: S2C7
    code: S2
  - name: Stage 3 — Subgoals and Q&A chains
    id: stage_3_subgoals_and_q_a_chains
    summary: Decomposes each goal into subgoals; emits a Q&A chain (length controlled by `config.difficulty.qa_chain_length`)
      that determines investigation hops + where evidence is placed.
    files:
    - stages/s03_subgoals.py
    - tables/subgoal_expansions.yaml`.
    checks:
    - id: every_goal_has_at_least_one_subgoal_no_orphan_goals
      scope: per-task
      what: Every goal has at least one subgoal; no orphan goals.
      why: An orphan goal has no Q&A chain, so no evidence gets placed and no investigation hops are seeded — the agent passes
        trivially because there's nothing concrete to discover.
      suggestion: Assert `len(subgoals_by_goal[g.id]) >= 1` for every emitted goal at stage 3 exit, surfacing the goal-type
        whose row in `subgoal_expansions.yaml` is missing.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It reads `stage_03.json`'s `subgoals[]`
        and confirms every goal ID from Stage 2 appears at least once as a `parent_id`. A task lands here when its config
        disables subgoal decomposition (single-hop goals only) — Stage 3 emits no subgoals because the goals are already atomic.
      code: S3C1
      script: audit/scripts/s03_subgoals.py::every_goal_has_at_least_one_subgoal_no_orphan_goals
    - id: every_subgoal_s_references_a_real_goal
      scope: per-task
      what: Every subgoal's `parent_id` references a real goal.
      why: 'A subgoal pointing at a non-existent `parent_id` becomes a phantom node: it places evidence and consumes a Q&A
        hop, but no goal grades against it, so the work is silently uncredited.'
      suggestion: Build a goal-ID set in stage 2 and validate every subgoal's `parent_id` membership before stage 3 returns.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It walks every `subgoals[].parent_id`
        in `stage_03.json` and confirms it resolves to a goal in `stage_02.json`. A task lands here when Stage 3 emits no
        subgoals at all (single-hop config), so there are no parent references to resolve.
      code: S3C2
      script: audit/scripts/s02_goals.py::every_subgoal_references_real_goal
    - id: qa_chain_length_per_goal_equals_or_falls_within_1_of
      scope: per-task
      what: QA-chain length per goal equals (or falls within ±1 of) `config.difficulty.qa_chain_length`.
      why: Drifting chain lengths break the difficulty contract — short chains let agents one-shot the answer (free credit),
        long chains exceed turn budgets and tank pass rates relative to the calibration target.
      suggestion: Enforce `abs(actual - config.difficulty.qa_chain_length) <= 1` per goal at stage 3 exit and surface the
        goal type causing the variance.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It measures the length of each
        `qa_chain[]` in `stage_03.json` against `config.difficulty.qa_chain_length`. A task lands here when its config omits
        `difficulty.qa_chain_length` entirely — Stage 3 emits no QA chain and there is no target length to compare against.
      code: S3C3
      script: audit/scripts/s03_subgoals.py::qa_chain_length_per_goal_within_band
    - id: evidence_placement_distribution_within_the_task
      scope: per-task
      what: Evidence-placement distribution within the task roughly matches `config.difficulty.evidence_weights` (chi-square
        or proportion check; don't expect exact).
      why: Skewed placement (e.g. everything in the wiki) means the agent always wins by checking one surface; the task no
        longer tests multi-surface triangulation as the difficulty config promised.
      suggestion: Run a chi-square or max-deviation check against `config.difficulty.evidence_weights` and reject tasks whose
        distribution exceeds the configured tolerance.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It counts evidence placements
        across surfaces in `stage_03.json` and compares the distribution against `config.difficulty.evidence_weights`. A task
        lands here when it has too few evidence placements for a statistically meaningful comparison (single-hop or single-surface
        tasks where the chi-square would be degenerate).
      code: S3C4
    - id: subgoal_ids_unique_across_the_task
      scope: per-task
      what: Subgoal IDs unique across the task.
      why: 'Duplicate subgoal IDs cause evidence-pointer collisions in the coverage manifest: two different findings get written
        to the same artifact path, overwriting each other at hydration time.'
      suggestion: Namespace subgoal IDs with their `parent_id` (e.g. `g3.s1`) and assert global uniqueness before returning
        from stage 3.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It reads the `subgoals[].id`
        set in `stage_03.json` and confirms no duplicates. A task lands here when Stage 3 emitted zero or one subgoal, making
        uniqueness structurally vacuous.
      code: S3C5
      script: audit/scripts/s02_goals.py::subgoal_ids_unique_across_the_task
    - id: each_subgoal_expansion_comes_from_a_row_in_no_llm
      scope: per-task
      what: Each subgoal expansion comes from a row in `tables/subgoal_expansions.yaml` (no LLM-invented decompositions at
        this stage).
      why: LLM-invented decompositions at this stage produce non-reproducible subgoal shapes that downstream stages can't
        bind reward kinds to, breaking the closed-set invariant and causing regen drift.
      suggestion: Hard-gate stage 3 expansions to row lookups in `tables/subgoal_expansions.yaml`; if no row matches, fail
        loudly rather than synthesizing.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 3 (Subgoals and Q&A chains). It validates that every subgoal
        in `stage_03.json` traces back to a row in `tables/subgoal_expansions.yaml` (no free-form LLM invention at this procedural
        stage). A task lands here when its goals are explicitly flagged in config as needing free-form decomposition outside
        the closed expansion table — the table-lookup invariant is deliberately disabled.
      code: S3C6
      script: audit/scripts/s03_subgoals.py::each_subgoal_expansion_comes_from_a_row
    code: S3
  - name: Stage 4 — Dependency edges
    id: stage_4_dependency_edges
    summary: Builds the goal DAG from edge-pattern templates. Inserts metagoals (ordering traps, destructive-order traps)
      when `metagoals.*` is configured.
    files:
    - stages/s04_edges.py
    - tables/edge_patterns.yaml`.
    checks:
    - id: dag_check_holds_no_cycles_auditor_re_runs_on_the
      scope: per-task
      what: DAG check holds (no cycles); auditor re-runs `_has_cycle` on the emitted edges.
      why: A cycle in the goal graph makes the runtime's topological ordering ill-defined, so ordering-trap metagoals can
        be "satisfied" by walking the cycle the wrong way and the agent collects undeserved credit.
      suggestion: Re-run `_has_cycle` (DFS with grey/black coloring) on the emitted edge list at stage 4 exit and fail with
        the offending back-edge.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It re-runs `_has_cycle` on the `edges[]`
        array in `stage_04.json` to confirm the goal graph is acyclic. A task lands here when it has fewer than two goals,
        so Stage 4 emits no edges and cycle detection is structurally vacuous.
      code: S4C1
      script: audit/scripts/s04_edges.py::dag_check_holds_no_cycles
    - id: every_edge_endpoint_resolves_to_a_declared_goal_id
      scope: per-task
      what: Every edge endpoint (`from`, `to`) resolves to a declared goal ID.
      why: 'Dangling endpoints make edges unenforceable: ordering traps that depend on them silently pass because the missing
        node never "completes," so destructive-order rewards never fire.'
      suggestion: Validate every `from`/`to` against the stage-2 goal-ID set immediately after edge generation in stage 4.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It resolves each `edges[].from` and
        `edges[].to` in `stage_04.json` against the goal IDs in `stage_02.json`. A task lands here when Stage 4 emitted no
        dependency edges (single-goal task or edges-disabled config), so there are no endpoints to resolve.
      code: S4C2
      script: audit/scripts/s04_edges.py::every_edge_endpoint_resolves
    - id: every_goal_participates_in_at_least_one_edge_or_is
      scope: per-task
      what: Every goal participates in at least one edge OR is explicitly terminal in `tables/edge_patterns.yaml`.
      why: An isolated goal can be completed in any order without tripping ordering traps, so the metagoals that depend on
        its position in the DAG never fire — destructive-edit traps in particular leak free credit.
      suggestion: Cross-check each goal against the edge list and the terminal allow-list in `tables/edge_patterns.yaml`;
        reject isolated non-terminal goals.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It cross-checks each goal in `stage_02.json`
        against `stage_04.json`'s edges and the terminal-goal allow-list in `tables/edge_patterns.yaml`. A task lands here
        when it has only a single goal — edge participation is undefined for a one-node graph.
      code: S4C3
      script: audit/scripts/s04_edges.py::every_goal_participates_in_at_least_one_edge
    - id: no_duplicate_edges_same_pair
      scope: per-task
      what: No duplicate edges (same `from→to` pair).
      why: Duplicate edges double-count toward edge-density bands and can cause ordering-trap rewards to fire twice for one
        violation, throwing off both calibration metrics and grader sums.
      suggestion: Deduplicate the edge list with a `set((from,to))` pass and assert `len(edges) == len(set(edges))` at stage
        4 exit.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It scans `stage_04.json`'s `edges[]`
        for any repeated `(from, to)` pair. A task lands here when Stage 4 emitted fewer than two edges, making duplication
        structurally impossible.
      code: S4C4
      script: audit/scripts/s04_edges.py::no_duplicate_edges
    - id: metagoal_ids_are_unique_and_their_referenced_goals
      scope: per-task
      what: Metagoal IDs are unique and their referenced goals exist.
      why: Duplicate metagoal IDs cause the reward compiler to register two checks under one name (later overwrites earlier),
        and references to missing goals make destructive-order traps unenforceable.
      suggestion: Assert ID uniqueness in the metagoal list and validate every referenced goal against the stage-2 goal set
        when `metagoals.*` is configured.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It reads the `metagoals[]` section
        of `stage_04.json` and validates uniqueness plus goal-reference resolution. A task lands here when its config doesn't
        enable any `metagoals.*` section (metagoals are opt-in per config) — Stage 4 emits no metagoals to validate.
      code: S4C5
      script: audit/scripts/s04_edges.py::metagoal_ids_unique_and_referenced_goals_exist
    - id: edge_density_falls_within_band
      scope: per-task
      what: Edge density falls within `config.structure.edge_density` band.
      why: 'Out-of-band density breaks the structural difficulty contract: low density makes the DAG near-linear and trivial
        to walk, high density creates unsolvable ordering tangles that tank pass rate.'
      suggestion: Compute `|edges| / |goals|` after stage 4 and clamp against `config.structure.edge_density`; regenerate
        edges with a tighter pattern set when out-of-band.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 4 (Dependency edges). It computes the edge-to-goal ratio
        from `stage_04.json` and compares against `config.structure.edge_density`. A task lands here when its config omits
        a `structure.edge_density` band — edge density is then unconstrained by design.
      code: S4C6
      script: audit/scripts/s04_edges.py::edge_density_falls_within_band
    code: S4
  - name: Stage 5 — Action matrix
    id: stage_5_action_matrix
    summary: 'Walks each entity (repo, wiki, issue, PR, file, …) and emits the action rows the agent could take: target /
      distractor / read-only.'
    files:
    - stages/s05_action_matrix.py
    - tables/action_matrix.yaml`.
    checks:
    - id: every_action_entry_has_a_target_entity_declared_in_the
      scope: per-task
      what: Every action entry has a target entity declared in the inventory.
      why: An action targeting an unknown entity has no hydration site, so the corresponding reward at grade time queries
        a non-existent surface and either always-fails (broken golden) or always-passes (free credit) depending on the kind.
      suggestion: Cross-reference every `action.entity` against the gym's inventory enum at stage 5 exit and fail with the
        offending row.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It walks each row in `stage_05.json`'s
        action matrix and confirms the target entity exists in the inventory. A task lands here when Stage 5 emits no action
        matrix at all — typical for pure-Q&A or read-only investigation tasks where the agent never performs a write action.
      code: S5C1
      script: audit/scripts/s05_action_matrix.py::every_action_entry_has_a_target_entity_declared_in_the
    - id: target_distractor_read_only_ratio_matches
      scope: per-task
      what: target/distractor/read-only ratio matches `config.structure.distractor_ratio`.
      why: 'Off-ratio matrices break difficulty calibration: too few distractors makes the task a single-path walk (high pass
        rate), too many overwhelms turn budget and collapses pass rate below the [0.1, 0.5) target.'
      suggestion: Compute the target/distractor/read-only ratio and clamp against `config.structure.distractor_ratio`; resample
        action rows when off-band.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It tallies the row-type distribution in
        `stage_05.json` and compares against `config.structure.distractor_ratio`. A task lands here when its config omits
        `structure.distractor_ratio` entirely — no ratio target is declared, so there is nothing to enforce.
      code: S5C2
    - id: no_duplicate_pairs
      scope: per-task
      what: No duplicate `(entity, verb)` pairs.
      why: Duplicate `(entity, verb)` rows produce two reward declarations in stage 6 with the same `name:` after templating,
        so the coverage manifest's bijection breaks and one is silently overwritten.
      suggestion: Deduplicate via a `set((entity, verb))` pass at the end of stage 5 and assert no collisions.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It scans `stage_05.json` for any repeated
        `(entity, verb)` pair. A task lands here when Stage 5 emitted fewer than two action rows, making duplication structurally
        impossible.
      code: S5C3
      script: audit/scripts/s05_action_matrix.py::no_duplicate_pairs
    - id: every_verb_in_the_matrix_maps_to_a_known_reward_kind
      scope: per-task
      what: Every verb in the matrix maps to a known reward kind in the gym's reward registry (catches "the world designer
        planned a verb that the gym can't compile a check for").
      why: A verb with no reward-registry mapping compiles to no check at grade time, so the agent can perform that action
        and collect (or skip) it with zero consequence — a hidden free-credit hole.
      suggestion: Look up every verb in the gym's reward registry at stage 5 exit and reject tasks whose matrix references
        unmapped verbs.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It maps each `verb` in `stage_05.json`
        to the gym's closed reward registry to catch verbs the compiler can't grade. A task lands here when Stage 5 emits
        no action verbs (investigation-only tasks where the agent never acts on an entity).
      code: S5C4
      script: audit/scripts/s05_action_matrix.py::every_verb_in_the_matrix_maps_to_a_known_reward_kind
    - id: each_goal_in_the_dag_has_at_least_one_action_row
      scope: per-task
      what: Each goal in the DAG has at least one **target** action row (reachable from the seed).
      why: A goal with no target action row has no concrete observable for the grader to bind to, so the goal silently passes
        (or silently fails) regardless of agent behavior — the goal effectively doesn't exist.
      suggestion: Group action rows by `goal_id` and assert each goal has `>= 1` target-classified row before stage 6.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It cross-references each goal in `stage_02.json`
        against `stage_05.json` and confirms at least one target row is reachable from the seed. A task lands here when the
        task's goals are all answer-only — no goal in the DAG requires an entity action, so the matrix-row requirement does
        not apply.
      code: S5C5
    - id: distractors_are_paired_for_every_distractor_at_least
      scope: per-task
      what: 'Distractors are paired: for every distractor, at least one same-kind target exists (avoids "distractor with nothing
        to confuse").'
      why: Unpaired distractors are obvious to the agent (only one entity of that kind exists, so it must be the target) —
        the confusion mechanism disappears and the task's difficulty band collapses.
      suggestion: For each distractor row, assert at least one same-kind target exists in the matrix; otherwise drop the distractor
        or promote a same-kind target.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 5 (Action matrix). It groups `stage_05.json` rows by entity
        kind and confirms every distractor has a same-kind target to be confused with. A task lands here when the task declares
        zero distractors in its action matrix (`config.structure.distractor_count == 0` or no distractor rows emitted), so
        the pairing invariant is trivially satisfied.
      code: S5C6
    code: S5
  - name: Substages 5b–5e — Structural planning
    id: substages_5b_5e_structural_planning
    summary: ''
    files: []
    checks:
    - id: convention_placements_name_a_format_e_g_a_content
      scope: per-task
      what: '**5b:** convention placements name a *format* (e.g. "a content surface titled ''Conventions''") and never the
        *answer*; auditor greps for hint-style phrases ("do not", "this is the bug") in any convention body and fails on hit.'
      why: If a convention surface leaks the answer text ("do not commit secrets — this is the bug"), the agent reads it and
        wins without investigation, producing a hint-leak that calibration won't catch but evals will.
      suggestion: Grep convention bodies for hint phrases (`"do not"`, `"this is the bug"`, `"the issue is"`) at 5b exit and
        fail on hit; keep placements as format-only.
      na_reason: This check belongs to Phase 1 — Skeleton, Substage 5b (Convention placements). It reads `stage_05b.json`
        and greps the bodies of declared convention placements for answer-leaking phrases. A task lands here when Stage 5b
        emits no convention placements at all — convention surfaces are an opt-in structural element.
      code: S5bC1
    - id: visual_finding_count_matches_every_is_in_the_closed
      scope: per-task
      what: '**5c:** visual-finding count matches `config.difficulty.visual_finding_count`; every `defect_type` is in the
        closed catalog; every `placement` belongs to the closed set of agent-visible content surfaces.'
      why: Out-of-closed-set defect types or placements can't be rendered by hydration, so the planned visual finding never
        appears in the world and its grader either over-fires (false fail) or never fires (free credit).
      suggestion: Validate every `defect_type` against the closed catalog and every `placement` against the agent-visible
        surfaces enum at 5c exit; check count matches `config.difficulty.visual_finding_count`.
      na_reason: This check belongs to Phase 1 — Skeleton, Substage 5c (Visual findings plan). It reads `stage_05c.json` and
        validates count, defect-type enum membership, and placement-surface closure. A task lands here when the task type
        is non-visual and Stage 5c emits no visual findings — visual planning is opt-in to visual task types only.
      code: S5bC2
    - id: distractor_count_matches_every_distractor_declares_a
      scope: per-task
      what: '**5d:** distractor count matches `config.structure.distractor_count`; every distractor declares a **guard reward
        kind** (`no_extra_*`); for each target reward, at least one structural distractor exists. *This is the per-task analog
        of the rubric check [`distractors_procedurally_generated`].*'
      why: A distractor without a `no_extra_*` guard means the agent gets credit for touching the wrong surface — the whole
        point of the distractor (penalize wrong action) is silently disabled.
      suggestion: Assert every distractor at 5d declares a `no_extra_*` guard reward kind, and verify each target reward has
        at least one paired structural distractor.
      na_reason: This check belongs to Phase 1 — Skeleton, Substage 5d (Distractor plan). It reads `stage_05d.json` and confirms
        count matches `config.structure.distractor_count`, every distractor has a `no_extra_*` guard kind, and target rewards
        are paired. A task lands here when `config.structure.distractor_count == 0` or Stage 5d is skipped — distractors are
        an opt-in structural element.
      code: S5bC3
    - id: every_tech_stack_choice_belongs_to_the_closed_set
      scope: per-task
      what: '**5e:** every tech-stack choice belongs to the closed set declared in `config`; cross-choices are internally
        consistent (no mismatched language / build tool pairs).'
      why: Off-set or internally-mismatched tech stacks (e.g. Python language + Maven build) produce unhydratable worlds where
        files reference tools that don't exist, so the agent sees a broken scaffold and grade-time path checks fail.
      suggestion: Validate each tech-stack field against the `config` closed set at 5e exit and run a cross-consistency table
        (language↔build-tool↔framework) before returning.
      na_reason: This check belongs to Phase 1 — Skeleton, Substage 5e (Tech-stack choices). It reads `stage_05e.json` and
        validates each choice against the closed set in `config` plus cross-choice consistency rules. A task lands here when
        no tech-stack choices are made in Stage 5e — typical when there is no scaffolded codebase (e.g. pure docs-investigation
        tasks).
      code: S5bC4
    - id: all_four_substage_outputs_must_be_deterministic_given
      scope: per-stage
      what: All four substage outputs must be deterministic given the same seed + config + previous stages — auditor re-runs
        and diffs.
      why: Non-determinism in 5b–5e means every regen produces a different placement set / distractor set / tech stack, so
        previously-validated goldens drift and snapshots become unreproducible.
      suggestion: Run each substage twice with the same `(seed, config, prior_stages)` and diff the outputs in CI; chase down
        any unseeded `random`/dict-iteration source.
      code: S5bC5
    code: S5b
  - name: Stage 6 — Reward declarations + coverage manifest
    id: stage_6_reward_declarations_coverage_manifest
    summary: 'Materializes the action matrix into compiler-format reward declarations (`agent_created_issue`, `file_content_replaced`,
      `state_unchanged`, …) and builds a **coverage manifest**: every reward maps to evidence pointers (files / wiki / issues
      / reasoning hops).'
    files:
    - stages/s06_rewards.py
    - prompts/reward_compiler_spec.md
    - gym_github/table_writes.py` (write-table source of truth).
    checks:
    - id: task_emits_at_least_one_reward
      scope: per-task
      what: Stage 6 emits at least one reward declaration — the task is gradable at all.
      why: A task without rewards is unscorable by construction. Stage 14 (golden solution) has nothing to verify, stage 15
        (verify+fix) has nothing to run, and at runtime the grader returns an empty subscore set. Every other Stage 6 check
        (registered kind, writes_to consistency, coverage manifest bijection) is vacuous on an empty reward list.
      suggestion: Assert `len(stage_06.json['rewards']) >= 1` at stage 6 exit; if the action matrix was empty, fix upstream
        rather than emitting a zero-reward task.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It opens `task-designer/drafts/<task>/stage_06.json`
        and reads its `reward_skeleton.templates` list. A task lands here when no draft Stage 6 artifact exists — most commonly
        because the task is a SHIPPED world under `task-designer/worlds/` (already past Stage 6, with the draft cleaned up),
        the task aborted before reaching Stage 6, or the audit labeled the same draft under a different ID convention. A task
        that genuinely reached Stage 6 with zero reward templates would appear as FAIL, not N/A.
      code: S6C1
      script: audit/scripts/floor_checks.py::task_emits_at_least_one_reward
    - id: every_is_in_the_gym_s_registered_closed_reward
      scope: per-task
      what: Every `reward.kind` is in the gym's registered closed reward universe (closed-check-universe invariant at design
        time).
      why: An unregistered `reward.kind` cannot compile at grade time — the check is silently dropped from the grader, so
        the agent's behavior on that surface is never scored (free credit on every run).
      suggestion: Look up every emitted `reward.kind` against the gym's closed reward universe at stage 6 exit and hard-fail
        with the offending kind name.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It validates
        every `reward.kind` in `stage_06.json` against the gym's closed reward registry. A task lands here when Stage 6 emits
        no reward declarations — typical for planning-only drafts or pipelines that aborted before Stage 6 ran.
      code: S6C2
      script: audit/scripts/s06_rewards.py::every_reward_kind_in_registered_closed_set
    - id: each_declared_write_target_or_equivalent_is_in_the_gym
      scope: per-task
      what: Each declared write-target (`writes_to:` or equivalent) is in the gym's closed set of agent-writable surfaces.
      why: A write-target outside the gym's writable set means hydration has nowhere to render the surface and the corresponding
        `no_extra_*` guard fires (or fails to fire) based on an unrendered path — broken golden either way.
      suggestion: Cross-check every `writes_to:` against the gym's closed writable-surface enum before emitting the reward;
        reject the matrix row, don't patch the kind.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It walks each
        `writes_to:` (or equivalent) field in `stage_06.json` and validates against the gym's closed set of agent-writable
        surfaces in `gym_github/table_writes.py`. A task lands here when all rewards are read-only or answer-style — no `writes_to`
        is declared, so there is nothing to validate.
      code: S6C3
    - id: for_every_action_whose_target_is_a_writable_surface_a
      scope: per-task
      what: For every action whose target is a writable surface, a dedup field (`accounted_by` or equivalent) is present —
        else the corresponding "no-extra-X" guard will over-fire at grade time.
      why: Missing `accounted_by` on a writable surface causes `no_extra_*` guards to count the agent's legitimate target
        write as an "extra," so the grader docks credit for the correct action — a systematic false-fail.
      suggestion: After stage 6, scan rewards whose target is in the writable-surfaces set and assert `accounted_by` (or equivalent)
        is present and non-empty.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It confirms
        each write-targeting reward in `stage_06.json` carries an `accounted_by` (or equivalent) dedup field so the paired
        `no_extra_*` guard doesn't over-fire at grade time. A task lands here when no action targets a writable surface —
        typical for pure investigation or answer-only tasks.
      code: S6C4
    - id: target_distractor_reward_count_matches_the_matrix_from
      scope: per-task
      what: Target/distractor reward count matches the matrix from stage 5 — no rewards added or dropped.
      why: Drift between the action matrix and emitted rewards means stage 5's distractor budget no longer matches what's
        graded — typically one over-fires (false fail) or one is missing (free credit on that surface).
      suggestion: Group both stage 5 matrix rows and stage 6 rewards by classification and assert exact count equality per
        (target, distractor) bucket.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It diffs reward
        counts in `stage_06.json` against the target/distractor row counts in `stage_05.json` to ensure none were silently
        added or dropped. A task lands here when Stage 5 emitted no action matrix in the first place — there is no baseline
        to compare against.
      code: S6C5
      script: audit/scripts/s06_rewards.py::target_distractor_reward_count_matches_the_matrix_from
    - id: coverage_manifest_is_bijective_with_rewards_paired_by
      scope: per-task
      what: 'Coverage manifest is bijective with rewards: `len(coverage) == len(rewards)`, paired by exact `name:`.'
      why: A non-bijective manifest means some reward has no planned evidence (hydration writes nothing → grader always-fails)
        or some evidence has no reward (hydration writes a leaky hint with no scoring → free credit).
      suggestion: Assert `len(coverage) == len(rewards)` and run a set-equality check on the `name:` fields at stage 6 exit;
        surface unmatched names on both sides.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It pairs `stage_06.json`'s
        `coverage[]` to `rewards[]` by exact `name:` and requires `len(coverage) == len(rewards)`. A task lands here when
        Stage 6 doesn't emit a coverage manifest — legacy or minimal task formats predating the manifest invariant.
      code: S6C6
    - id: no_template_placeholders_in_reward_names_generic_verbs
      scope: per-task
      what: No template placeholders in reward names (`TARGET_REPO_*`, generic verbs, etc.).
      why: Placeholder names like `TARGET_REPO_*` make every task share a reward name across the corpus, so accounted-by dedup
        collapses multiple distinct checks into one and grading becomes globally wrong.
      suggestion: Regex-grep reward `name:` for uppercase placeholders and generic-verb patterns at stage 6 exit; fail with
        the template that didn't get substituted.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It greps `reward.name`
        strings in `stage_06.json` for unresolved placeholders like `TARGET_REPO_*` or generic verbs. A task lands here when
        Stage 6 emits no rewards at all, so there are no names to inspect.
      code: S6C7
      script: audit/scripts/s06_rewards.py::no_template_placeholders_in_reward_names
    - id: evidence_pointers_resolve_every_triple_has_a_planned
      scope: per-task
      what: 'Evidence pointers resolve: every `(entity_kind, entity_id, artifact_path)` triple has a planned home in the world
        (will be filled by hydration).'
      why: An unresolvable `(entity_kind, entity_id, artifact_path)` triple means hydration has no place to write the evidence,
        so the agent can't discover the answer through the planned path — task becomes unsolvable.
      suggestion: Validate every coverage triple against the planned-world inventory (from stages 4–5e) at stage 6 exit and
        reject tasks with dangling pointers.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It walks each
        `(entity_kind, entity_id, artifact_path)` triple in `stage_06.json`'s coverage manifest and confirms a planned home
        exists for hydration to fill. A task lands here when rewards declare no evidence pointers — typical for pure state-diff
        rewards graded entirely off DB queries with no evidence grounding.
      code: S6C8
    - id: mutual_exclusion_sets_cover_all_sibling_action_verbs
      scope: per-task
      what: Mutual-exclusion sets cover all sibling action verbs on the same entity (e.g. `create_X` vs `edit_X` cannot both
        award credit).
      why: Without mutual-exclusion sets, `create_X` and `edit_X` on the same entity both award credit, so the agent gets
        paid twice for one logical action and pass rate inflates above the calibrated target.
      suggestion: Group rewards by `(entity_kind, entity_id)` and assert each sibling-verb set is declared in a mutual-exclusion
        group before stage 6 returns.
      na_reason: This check belongs to Phase 1 — Skeleton, Stage 6 (Reward declarations + coverage manifest). It groups `stage_06.json`
        rewards by entity and confirms sibling verbs (e.g. `create_X` vs `edit_X`) appear in the same mutual-exclusion set
        so credit can't be double-awarded. A task lands here when no entity has multiple action verbs in the matrix — each
        entity is touched by at most one verb, so there are no siblings to mutually exclude.
      code: S6C9
    code: S6
- name: Phase 2 — Hydration (LLM)
  id: phase_2_hydration_llm
  corpus: draft
  corpus_path: task-designer/drafts/
  stages:
  - name: Stage 7 — Narrative
    id: stage_7_narrative
    summary: First LLM call. Turns the procedural skeleton into a real-world narrative (story, entity names, terminology)
      without inventing structure.
    files:
    - stages/s07_narrative.py
    - prompts/narrative.md`.
    checks:
    - id: entity_name_diversity_no_all_greek_letter_or_all
      scope: per-task
      what: 'Entity name diversity: no all-Greek-letter (`alpha/beta/gamma`) or all-generic (`entity1/entity2`) sets; auditor
        flags Levenshtein-similarity > 0.7 across same-kind entities.'
      why: Greek-letter or `entity1/entity2` names make distractors trivially distinguishable as 'the planted one,' destroying
        the cognitive load the task was sized for and inflating pass-rate above the calibration band.
      suggestion: In stage_7_narrative, post-process LLM output through a name-diversity check (Levenshtein < 0.7, no `\b(alpha|beta|gamma|entity\d+)\b`)
        and re-prompt with rejected names listed.
      na_reason: This check belongs to Phase 2, Stage 7 (Narrative), and reads the hydrated entity-name set against the kind
        groupings produced by Stage 5's action-matrix inventory in stage_05.json. It compares same-kind peers (Levenshtein
        > 0.7) to catch lazy naming like alpha/beta/gamma. The task lands N/A because its Stage 5 inventory declared fewer
        than two entities of any single kind, so there is no peer set to compare names against.
      code: S7C1
    - id: entity_count_per_kind_matches_stage_5_inventory
      scope: per-task
      what: Entity count per kind matches stage 5 inventory exactly (LLM didn't add or drop entities).
      why: If the LLM silently adds an entity, stage 6's reward bindings reference an entity the world doesn't have (or vice
        versa) — graders fail to resolve targets and goldens break at runtime.
      suggestion: After stage 7, diff hydrated kind-counts against stage 5's inventory; on mismatch reject the response and
        re-prompt with the exact required counts.
      na_reason: This Phase 2, Stage 7 check diffs the hydrated entity count per kind against the inventory recorded in stage_05.json
        to confirm the LLM did not add or drop entities during narrative hydration. It is N/A here because Stage 5 produced
        no entity inventory at all — typical for pure-prompt or answer-only tasks that have no world entities to hydrate,
        leaving nothing to count against.
      code: S7C2
    - id: body_contains_zero_matches_against_the_hint_leak_regex
      scope: per-task
      what: '`narrative_hints` body contains zero matches against the hint-leak regex (same patterns used by `_check_answer_hints`).'
      why: Narrative copy is the easiest place for the LLM to telegraph the answer ('the real culprit is…'), giving the agent
        a free win without doing the investigation the task is meant to score.
      suggestion: Run `_check_answer_hints` regex over `narrative_hints.body` immediately after stage 7 and gate progression
        on zero matches.
      na_reason: This Phase 2, Stage 7 check reads the `narrative_hints` body from the Stage 7 narrative artifact and runs
        the hint-leak regex (same patterns as `_check_answer_hints`) over it. The task lands N/A because its Stage 7 output
        omitted the `narrative_hints` field entirely, so there is no body of text for the regex to scan.
      code: S7C3
    - id: domain_vocabulary_is_present_in_terminology_matches
      scope: per-task
      what: Domain vocabulary is present in `conventions` — terminology matches the task's stated domain rather than generic
        verbs.
      why: Generic verbs ('do the thing', 'check the system') make tasks read as templates rather than real artifacts — degrades
        realism, lowers face-validity, and weakens transfer to actual product work.
      suggestion: Pass the declared domain (e.g. `fintech`, `devops`) into the stage 7 prompt and require ≥N domain-specific
        terms in `conventions`; flag if absent.
      na_reason: This Phase 2, Stage 7 check inspects the `conventions` block of the Stage 7 narrative artifact, looking for
        domain-specific terminology rather than generic verbs. It is N/A because either the narrative omitted the `conventions`
        block, or the task's objective is domain-neutral and declares no domain whose vocabulary could be matched.
      code: S7C4
    - id: every_entity_id_referenced_by_stages_1_6_has_a_name
      scope: per-task
      what: Every entity ID referenced by stages 1–6 has a name field assigned.
      why: An unnamed entity propagates as a raw ID through stage 8's YAML and the prompt, producing artifacts like 'review
        PR `repo_3_pr_2`' that look broken and confuse the agent.
      suggestion: After stage 7, enumerate IDs from stages 1–6 and assert each has a `name` in the narrative payload; re-prompt
        for any missing.
      na_reason: This Phase 2, Stage 7 check walks the entity IDs declared across Phase 1 outputs (stage_01.json through stage_06.json)
        and confirms each one has a `name` assigned in the hydrated narrative. It is N/A because Stages 1–6 declared no entity
        IDs for this task — common for answer-only tasks with no world graph to name.
      code: S7C5
    - id: auditor_re_runs_llm_verification_by_sampling_3_entity
      scope: per-task
      what: 'Auditor re-runs LLM verification by sampling 3 entity descriptions and asking a separate verifier: "does this
        read like a real-company artifact or like a template?"'
      why: Regex checks miss subtle template-tells ('Acme Corp engineer reported the issue'); without a semantic re-check,
        generic prose ships and human reviewers reject the batch downstream.
      suggestion: Add an auditor sampler that picks 3 entity descriptions and prompts a verifier LLM with 'real artifact or
        template?' — gate on majority real.
      na_reason: This Phase 2, Stage 7 check samples three hydrated entity descriptions from the Stage 7 narrative artifact
        and runs a separate LLM verifier to judge whether each reads like a real-company artifact rather than a template.
        It is N/A because the task produced fewer than three hydrated entity descriptions, so the 3-sample protocol cannot
        execute.
      code: S7C6
    code: S7
  - name: Stage 7b — YAML skeleton
    id: stage_7b_yaml_skeleton
    summary: Builds a **parseable, linter-clean** YAML skeleton with `LLM_MUST_FILL_THIS_PLACEHOLDER` tags. No LLM. Hydration
      fills placeholders rather than inventing structure.
    files:
    - stages/s07b_skeleton.py`.
    checks:
    - id: task_has_non_empty_prompt
      scope: per-task
      what: Skeleton declares a non-empty `task.prompt` (placeholder or filled) — the agent will have instructions to act
        on.
      why: An empty prompt makes the task unsolvable — the agent doesn't know what to do, hydration has nothing to anchor
        rewriting against, and the grader scores zero by default. Every downstream prompt-grounding check assumes the prompt
        is non-empty.
      suggestion: Require a non-empty `task.prompt` field in the skeleton (placeholder OK at stage 7b); add a stage-exit assertion
        `len(skeleton['task']['prompt'].strip()) > 0`.
      na_reason: This check belongs to Phase 2 — Hydration, Stage 7b (YAML skeleton). It opens `task-designer/drafts/<task>/skeleton.yaml`
        and reads `task.prompt`. A task lands here when no Stage 7b skeleton was emitted for it — most commonly because the
        draft is older than the Stage 7b step (the gym added skeleton emission late in its history, so legacy drafts skip
        straight from Phase 1 to hydration), the draft paused in Phase 1 before reaching Stage 7b, or it's a SHIPPED task
        whose draft was cleaned up. A task that reached Stage 7b and emitted an empty prompt would appear as FAIL.
      code: S7bC1
      script: audit/scripts/floor_checks.py::task_has_non_empty_prompt
    - id: task_declares_at_least_one_tool
      scope: per-task
      what: Skeleton declares at least one entry under `task.tools` — the agent has some way to interact with the world.
      why: With an empty tool list the agent cannot act, so the task is unsolvable. The runtime tool-list and the canonical-tools
        lint are both vacuous on an empty `tools:`, so a regression slips through silently.
      suggestion: Add a stage-exit assertion `len(skeleton['task']['tools']) >= 1` to stage 7b, and validate that the entries
        belong to the gym's registered tool catalog.
      na_reason: This check belongs to Phase 2 — Hydration, Stage 7b (YAML skeleton). It opens `task-designer/drafts/<task>/skeleton.yaml`
        and reads `task.tools[]`. A task lands here when no Stage 7b skeleton artifact exists — most commonly because the
        draft predates the Stage 7b step (only ~half of drafts in this corpus have a skeleton.yaml), the draft paused before
        reaching Phase 2, or it's a SHIPPED task whose draft was cleaned up. A task that reached Stage 7b and emitted an empty
        tool list would appear as FAIL.
      code: S7bC2
      script: audit/scripts/floor_checks.py::task_declares_at_least_one_tool
    - id: skeleton_parses_with
      scope: per-task
      what: Skeleton parses with `yaml.safe_load`.
      why: If the skeleton itself is malformed YAML, stage 8's chunked hydration emits indented sub-trees into a broken parent
        and the final file fails `yaml.safe_load`, killing every variant in the batch.
      suggestion: Run `yaml.safe_load` on the skeleton before stage 8 starts; raise immediately on parse error so the skeleton
        builder (not hydration) gets blamed.
      na_reason: This Phase 2, Stage 7b check runs `yaml.safe_load` against the Stage 7b skeleton.yaml file. It is N/A because
        the task did not emit a Stage 7b skeleton artifact — likely a gym variant that hydrates the world YAML directly without
        the intermediate placeholder-skeleton step.
      code: S7bC3
      script: audit/scripts/s07b_skeleton.py::skeleton_parses_with_yaml_safe_load
    - id: round_trip_stable_modulo_formatting
      scope: per-task
      what: 'Round-trip stable: `yaml.dump(yaml.safe_load(skel)) == skel` (modulo formatting).'
      why: Round-trip instability signals duplicate keys or anchor abuse — silently dropped sections at parse time mean rewards
        or entities vanish without warning, leading to under-validated tasks.
      suggestion: Assert `yaml.safe_load → yaml.safe_dump → yaml.safe_load` is idempotent in stage 7b's exit gate.
      na_reason: This Phase 2, Stage 7b check round-trips the skeleton.yaml file through `yaml.dump(yaml.safe_load(...))`
        to confirm load/dump stability. It is N/A because no Stage 7b skeleton file was emitted for this task (gyms that skip
        the placeholder-skeleton step go straight from Stage 7 narrative to Stage 8 hydration).
      code: S7bC4
    - id: required_top_level_sections_present_whatever_the_gym_s
      scope: per-task
      what: Required top-level sections present (whatever the gym's task schema mandates — e.g. world block, bootstrap, task,
        coverage manifest).
      why: Missing top-level sections (e.g. `bootstrap`, `coverage`) cause the world validator to reject the hydrated file
        at the very end, after expensive LLM calls — wasted spend and stuck pipeline.
      suggestion: Drive the section list from the gym's Pydantic schema and check presence in stage 7b before any hydration
