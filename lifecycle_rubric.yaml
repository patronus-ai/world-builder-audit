      suggestion: Validate `guide_task_design.py` output schema requires `{category, severity, path}` and reject runs with
        bare-text findings.
      na_reason: This check reads the Stage 10 guide-audit output (from `scripts/guide_task_design.py`) and validates that
        each finding entry carries category, severity, and a YAML pointer. Stage 10 returned an empty findings list for this
        task, so there are no entries to inspect for required metadata.
      code: S10C1
    - id: reward_hacking_review_specifically_reasons_about_each
      scope: per-task
      what: Reward-hacking review specifically reasons about each reward in turn — auditor counts review entries vs reward
        count and flags any reward never mentioned.
      why: If a reward is never mentioned in the hacking review, no one checked whether it can be gamed — the agent may earn
        free credit via a shortcut the review never imagined.
      suggestion: Count `review_entries` per `reward.id` and require ≥1 entry per reward; flag any unreviewed reward in the
        audit report.
      na_reason: This Phase 3, Stage 10 check counts entries in the reward-hacking review pass and compares them to the task's
        declared reward count. The pass did not produce a review record for this task — typically because the LLM review sub-pass
        was skipped or the task declares no rewards to reason about — so there is nothing to count.
      code: S10C2
    - id: llm_review_confidence_is_recorded_cheap_judgment_vs
      scope: per-task
      what: LLM review confidence is recorded (cheap-judgment vs strong-judgment).
      why: Without confidence tagging, a low-conviction LLM hunch is treated the same as a strong finding — stage 11 wastes
        refine budget on noise while real bugs get the same priority as guesses.
      suggestion: 'Require the guide-audit output to include a `confidence: {cheap,strong}` field per finding and surface
        the distribution.'
      na_reason: This check reads the confidence field that the Stage 10 LLM review pass writes alongside its findings. The
        task's guide audit completed using only the deterministic static checks; the LLM review sub-pass never ran, so no
        confidence value was emitted to evaluate.
      code: S10C3
    - id: audit_re_runs_are_stable_re_running_stage_10_on_the
      scope: per-stage
      what: 'Audit re-runs are stable: re-running stage 10 on the same input must produce the same finding count ± small noise
        budget.'
      why: An unstable guide-audit means the gate is non-deterministic — a task that passes today may fail tomorrow with the
        same YAML, so audit verdicts can't be trusted as ship signals.
      suggestion: Run stage 10 twice on a sample and fail if finding-count variance exceeds the configured noise budget (e.g.
        ±2).
      code: S10C4
    code: S10
  - name: Stage 11 — Refine
    id: stage_11_refine
    summary: Claude Agent SDK fixes the YAML based on stage-10 findings, batched by category.
    files:
    - stages/s11_refine.py`.
    checks:
    - id: net_finding_count_after_refine_before_no_progress_is_a
      scope: per-task
      what: Net finding count after refine < before (no-progress is a fail-state).
      why: If refine doesn't reduce findings, the LLM either gave up or applied null edits — the task ships with the same
        defects stage 10 caught, wasting the whole gate.
      suggestion: In the refine orchestrator, compare pre/post finding counts and fail the stage when delta ≥ 0.
      na_reason: This Phase 3, Stage 11 check compares finding counts in the Stage 10 audit before and after the refine agent's
        edits. Refine was never invoked for this task because Stage 10 emitted zero findings, so there is no before/after
        delta to score for progress.
      code: S11C1
    - id: no_new_blocking_findings_introduced_auditor_diffs
      scope: per-task
      what: No new blocking findings introduced — auditor diffs before/after and flags any net-new `BLOCKING_*` category.
      why: Refine can over-edit and introduce new blockers (e.g. break an anchor while fixing a leak) — without diff-checking,
        the task regresses silently past stage 11 with worse defects than it entered.
      suggestion: Diff stage-10 vs stage-11 findings by category and hard-fail on any net-new `BLOCKING_*` entry.
      na_reason: This check diffs the Stage 10 finding sets before and after Stage 11 to ensure refine introduced no new `BLOCKING_*`
        categories. Stage 11 was skipped entirely for this task — there were no findings to drive a refine pass — so no diff
        exists to inspect.
      code: S11C2
    - id: diff_is_targeted_edits_touch_only_sections_referenced
      scope: per-task
      what: 'Diff is targeted: edits touch only sections referenced in findings (no full-file rewrites).'
      why: Full-file rewrites mean refine reshaped sections nobody asked it to — narrative, entity ids, or goldens may drift,
        breaking trajectories that previously graded correctly.
      suggestion: Compute the YAML diff against the finding pointers and flag any edit outside the cited jsonpaths.
      na_reason: This Stage 11 check examines the YAML diff the refine agent produced and verifies edits stay within sections
        cited by Stage 10 findings. With no findings to act on, the refine stage produced no diff for this task, so there
        is nothing to evaluate for targeting.
      code: S11C3
    - id: refined_yaml_still_passes_linter_no_regressions_on
      scope: per-task
      what: Refined YAML still passes linter (no regressions on rules already clean).
      why: Refine fixing one guide finding while breaking a previously-clean lint rule means the task moves laterally — net
        quality stays flat or drops, defeating the gate.
      suggestion: Re-run `lint_tasks.py` after refine and fail on any rule that was clean pre-refine but fires post-refine.
      na_reason: This check re-runs the reward linter on the Stage 11 refined YAML to confirm previously clean rules stayed
        clean. Because Stage 11 never ran for this task, no refined YAML exists to re-lint.
      code: S11C4
    - id: entity_count_reward_count_unchanged_before_after
      scope: per-task
      what: Entity count + reward count unchanged before/after refine (no silent drops while fixing).
      why: A silent reward drop during refine means a grading dimension disappeared — the task suddenly scores easier without
        any reviewer noticing the missing check.
      suggestion: Snapshot `len(entities)` and `len(rewards)` pre/post refine and assert equality in the stage-11 post-check.
      na_reason: This Stage 11 check compares entity and reward counts in the pre-refine vs post-refine YAML to catch silent
        drops during fixes. Refine was bypassed for this task, so there is no post-refine YAML to diff against the pre-refine
        version.
      code: S11C5
    code: S11
  - name: Stage 12 — Blind judge
    id: stage_12_blind_judge
    summary: Sonnet does a **blind A/B comparison** vs `task_001_licensing_audit_hard.yaml` (random side assignment).
    files:
    - stages/s12_judge.py
    - prompts/judge.md`.
    checks:
    - id: side_assignment_is_recorded_and_randomized_auditor
      scope: per-batch
      what: Side assignment is recorded and randomized (auditor checks the side-assignment log for ~50/50 distribution across
        a batch).
      why: Without recorded random side assignment, the judge may have a positional bias (A-side favoritism) that masquerades
        as a real quality verdict — promotions become coin flips.
      suggestion: Audit the side-assignment log for ~50/50 distribution per batch and fail on skew beyond a configured threshold.
      code: S12C1
    - id: verdict_has_scores_on_every_required_dimension_reward
      scope: per-task
      what: Verdict has scores on every required dimension (reward specificity, distractors, chain depth, narrative, coverage,
        UI).
      why: A missing dimension means the judge skipped a quality axis — e.g. no distractor score lets weakly-distracted tasks
        promote, eroding gym difficulty calibration.
      suggestion: Schema-validate judge output against the required dimension list (reward specificity, distractors, chain
        depth, narrative, coverage, UI) and reject incomplete verdicts.
      na_reason: This Phase 3, Stage 12 check reads the blind A/B verdict file produced by `s12_judge.py` and confirms every
        required dimension is scored. The judge stage did not run for this task — typically because judging was disabled in
        config or the reference comparison task was unavailable — so no verdict artifact exists.
      code: S12C2
    - id: reasoning_cites_concrete_yaml_sections_line_numbers
      scope: per-task
      what: Reasoning cites concrete YAML sections (line numbers / jsonpaths) — no vague "this task is better" claims.
      why: Vague reasoning isn't actionable for stage 13 improve and can't be audited — the judge's verdict becomes an opaque
        preference rather than a defensible quality signal.
      suggestion: Require judge output to include jsonpath or line citations per dimension and reject reasoning blocks lacking
        concrete pointers.
      na_reason: This check inspects the Stage 12 judge's reasoning text for concrete YAML citations (line numbers or jsonpaths).
        Since the blind judge was not invoked for this task, there is no reasoning artifact to scan for citation quality.
      code: S12C3
    - id: auditor_spot_runs_judge_with_sides_swapped_on_a_sample
      scope: per-batch
      what: Auditor spot-runs judge with sides swapped on a sample of N tasks and expects consistent preferences (a flippy
        judge means weak criteria).
      why: A flippy judge means the criteria are too soft to distinguish tasks — promotion verdicts are noise, and the baseline
        comparison stops being a meaningful gate.
      suggestion: On a sample of N tasks per batch, swap sides and re-run the judge; flag any preference reversal as a criteria-weakness
        smell.
      code: S12C4
    code: S12
  - name: Stage 13 — Improve
    id: stage_13_improve
    summary: Up to `max_improvement_rounds` LLM passes applying judge feedback.
    files:
    - stages/s13_improve.py`.
    checks:
    - id: improvement_diff_targets_only_judge_flagged_sections
      scope: per-task
      what: Improvement diff targets only judge-flagged sections (no full rewrites).
      why: A full rewrite during improve drifts narrative, entity ids, or goldens — trajectories that previously graded correctly
        may break, and the change is too broad to review.
      suggestion: Diff the improve edits against the judge's cited sections and fail on edits outside the flagged jsonpaths.
      na_reason: This Phase 3, Stage 13 check examines the improvement-pass diff and verifies edits stay within sections flagged
        by Stage 12's judge verdict. Stage 13 produced no diff for this task because Stage 12 returned no actionable feedback
        (or did not run at all), so there is nothing to evaluate.
      code: S13C1
    - id: post_improvement_judge_run_shows_non_decreasing_score
      scope: per-task
      what: Post-improvement judge run shows non-decreasing score on every dimension.
      why: If any dimension regresses post-improve, the LLM traded one weakness for another — net quality stays flat or worse,
        defeating the iteration budget.
      suggestion: Re-run the blind judge after improve and assert every dimension's score is ≥ its pre-improve value.
      na_reason: This check re-runs the Stage 12 blind judge after Stage 13 and confirms scores did not drop on any dimension.
        Stage 13 was skipped for this task — no judge feedback drove an improvement pass — so no post-improvement judge run
        exists to compare.
      code: S13C2
    - id: reward_count_unchanged_before_after_improvement
      scope: per-task
      what: Reward count unchanged before/after improvement.
      why: A silent reward drop during improve removes a grading axis — the task suddenly scores easier, masking the regression
        as an apparent quality gain.
      suggestion: Snapshot reward count pre/post improve in the orchestrator and assert equality before accepting the round.
      na_reason: This Stage 13 check compares the reward count in the YAML before and after the improvement pass to catch
        silent drops. Because Stage 13 never executed for this task, there is no post-improvement YAML to diff against the
        pre-improvement version.
      code: S13C3
    - id: linter_remains_clean_after_improvement_no_regressions
      scope: per-task
      what: Linter remains clean after improvement (no regressions).
      why: Improve can introduce new lint findings (broken anchors, leaked answers) while polishing narrative — the task ships
        with structural reward bugs that linting was supposed to block.
      suggestion: Re-run `lint_tasks.py` after each improve round and fail on any new finding.
      na_reason: This check re-runs the reward linter on the Stage 13 output to confirm improvement edits introduced no regressions.
        Stage 13 was bypassed for this task, so no post-improvement YAML exists to re-lint.
      code: S13C4
    - id: total_llm_rounds_used_if_equal_log_it_as_a_quality
      scope: per-task
      what: Total LLM rounds used ≤ `max_improvement_rounds`; if equal, log it as a quality smell.
      why: Hitting `max_improvement_rounds` means improvement never converged — the task likely ships with residual judge-flagged
        weaknesses, just below the no-progress threshold.
      suggestion: Emit `rounds_used` in the stage-13 report and flag tasks where it equals `max_improvement_rounds` as smell-only
        ship.
      na_reason: This Phase 3, Stage 13 check reads the round counter against `max_improvement_rounds` to detect tasks that
        exhausted the budget. The task consumed zero improvement rounds because Stage 12 surfaced no judge-driven changes
        to apply, so the cap is trivially honored and there is no smell to log.
      code: S13C5
    code: S13
- name: Phase 4 — Ship
  id: phase_4_ship
  corpus: draft
  corpus_path: task-designer/drafts/
  stages:
  - name: Final audit + Opus corrective pass
    id: final_audit_opus_corrective_pass
    summary: Runs `s10_validate` + `guide_task_design.py` once more; batched Opus Agent SDK fixes any remaining audit issues;
      final lint-fix loop with the same blocking categories.
    files:
    - run.py` `_final_audit
    - stages/reward_linter.py`.
    checks:
    - id: final_lint_findings_count_0_in_blocking_categories
      scope: per-task
      what: Final lint findings count = 0 in blocking categories (else block ship).
      why: Shipping with blocking findings (anchor leaks, citation gaps, reward/evidence mismatches) lets broken tasks reach
        Taiga where they either grade wrong or hand the agent free credit via leaked answers.
      suggestion: Gate `make taiga build` on `scripts/lint_tasks.py --min-severity high` returning zero — fail the ship step
        instead of warning.
      na_reason: 'This check belongs to Phase 4 — Ship (Final audit + Opus corrective pass) and reads the final reward-linter
        findings against blocking categories before the task is allowed to ship. It is not applicable when the task''s YAML
        carries documented `# lint-ignore: <CATEGORY>` headers with a written rationale tied to an intentional design pattern
        (e.g. an audit task that deliberately discloses drift across multiple surfaces), so the blocking finding is structurally
        accurate but suppressed on purpose.'
      code: FAC1
    - id: idempotency_re_running_the_final_audit_must_produce
      scope: per-stage
      what: 'Idempotency: re-running the final audit must produce identical findings (no flakiness across runs).'
      why: Non-deterministic findings mean an Opus pass that 'fixes' a finding may just be chasing noise; the next regen reintroduces
        or invents new findings and goldens drift run-over-run.
      suggestion: Seed all linter LLM-judge calls and sort finding output in `s10_validate` so two back-to-back runs diff
        to empty before declaring done.
      code: FAC2
    - id: reward_entity_counts_unchanged_from_stage_13_no_silent
      scope: per-task
      what: Reward + entity counts unchanged from stage 13 (no silent drops while fixing).
      why: If the Opus fix silently drops a reward or entity reference while patching prose, the task ships with weaker grading
        than the design intended and the agent can pass by ignoring the dropped behavior.
      suggestion: Snapshot `len(rewards)` and entity-ID set before/after the corrective pass and abort the ship if they diverge
        — wire into `final_audit` post-check.
      na_reason: This check sits in Phase 4 — Ship (Final audit + Opus corrective pass) and compares the reward/entity counts
        in the shipped YAML before and after the Opus corrective edits. It is not applicable when Stage 13 returned a clean
        audit, because no corrective pass ran and there is no before/after delta to diff for silent drops.
      code: FAC3
    - id: opus_diff_scope_edits_limited_to_flagged_sections
      scope: per-task
      what: 'Opus diff scope: edits limited to flagged sections; auditor flags refactors that touch the whole task body.'
      why: Whole-body refactors invalidate the stage-14 golden (trajectory steps reference text that no longer exists) and
        bypass the targeted-fix invariant, so subsequent verify+fix loops compound errors instead of converging.
      suggestion: Constrain the Opus Agent SDK call to flagged anchors only and reject diffs whose unified-diff line count
        exceeds, e.g., 3x the flagged-region size.
      na_reason: This check belongs to Phase 4 — Ship (Final audit + Opus corrective pass) and inspects the diff produced
        by the batched Opus Agent SDK fix step to confirm edits stayed inside the flagged sections. It is not applicable when
        Stage 13 surfaced no audit issues, so Opus never edited the task body and there is no diff scope to evaluate.
      code: FAC4
    code: FA
  - name: Stage 14 — Golden solution
    id: stage_14_golden_solution
    summary: Batched LLM emits a `task_<id>_solution.yaml` describing the trajectory + final-state mutations a perfect agent
      would produce.
    files:
    - stages/s14_solution.py
    - stages/solution_helpers.py`.
    checks:
    - id: solution_yaml_parses_every_entity_reference_resolves
      scope: per-task
      what: Solution YAML parses; every entity reference resolves to a world entity.
      why: An unresolved entity reference means the reward harness in stage 15 cannot execute the step — the golden is unrunnable
        and the verify loop wastes its 24-attempt budget chasing a phantom ID.
      suggestion: After emit, parse with `solution_helpers.load_solution` and cross-check every `entity_id` against the world
        YAML's entity table before passing to stage 15.
      na_reason: This check belongs to Phase 4 — Ship, Stage 14 (Golden solution) and validates that `task_data/solutions/task_<id>_solution.yaml`
        parses and that every entity reference it makes resolves back to an entity in the shipped world YAML. It is not applicable
        to answer-only tasks whose solution is a final natural-language answer string with no entity references to resolve
        against the world.
      code: S14C1
      script: audit/scripts/lint_and_golden.py::golden_solution_yaml_parses
    - id: for_every_reward_in_the_task_the_solution_has_at_least
      scope: per-task
      what: '**Reward coverage** — for every reward in the task, the solution has at least one trajectory step or final-state
        mutation that targets it.'
      why: Uncovered rewards can never pass the harness — the verify loop will mis-diagnose this as a task bug and patch a
        perfectly good reward away, weakening the grader.
      suggestion: Build a reward-id → solution-step coverage map in stage 14 and require coverage ≥ 1 per reward; emit `MISSING_COVERAGE`
        before stage 15 runs.
      na_reason: This check belongs to Phase 4 — Ship, Stage 14 (Golden solution) and walks each reward in the shipped task
        YAML to confirm the solution has at least one trajectory step or final-state mutation that drives it to pass. It is
        not applicable to tasks whose rewards are exclusively passive `pre_existing` state checks, because no agent action
        or mutation is required to satisfy them and the solution legitimately has nothing to record.
      code: S14C2
    - id: no_magic_numbers_strings_every_value_in_the_solution
      scope: per-task
      what: No magic numbers/strings — every value in the solution is derivable from (or quoted from) the world YAML; no LLM-invented
        identifiers.
      why: LLM-invented identifiers or counts don't exist in the seeded DB/git server; the trajectory step fails, verify+fix
        patches the task to match the hallucination, and the shipped task no longer reflects the world.
      suggestion: Validate every literal in the solution against the world YAML's value-set (entities, paths, counts) and
        reject the emit if any value is unsourced.
      na_reason: This check belongs to Phase 4 — Ship, Stage 14 (Golden solution) and cross-references every identifier, path,
        and numeric literal in `task_<id>_solution.yaml` back to the world YAML to ensure nothing was invented by the LLM.
        It is not applicable when the solution contains only natural-language reasoning or final-answer text, with no concrete
        identifiers or values to trace back to world entities.
      code: S14C3
    - id: file_edit_instructions_match_schema_no_free_form_prose
      scope: per-task
      what: File-edit instructions match `solution_helpers.py` schema (no free-form prose where the harness expects JSON).
      why: Free-form prose where the harness expects a JSON file-edit payload makes the step a no-op — the file mutation never
        lands, the state reward fails, and stage 15 burns attempts diagnosing the wrong layer.
      suggestion: Validate every file-edit step against the pydantic model in `solution_helpers.py` at emit time; refuse the
        solution if any step is a string instead of a structured op.
      na_reason: This check belongs to Phase 4 — Ship, Stage 14 (Golden solution) and validates any file-edit steps in `task_<id>_solution.yaml`
        against the JSON schema defined in `solution_helpers.py`. It is not applicable to read-only investigation or answer-only
        tasks whose golden solution contains no file-edit steps, leaving nothing to schema-check.
      code: S14C4
    - id: trajectory_length_is_plausible_steps_1_step_a_one_step
      scope: per-task
      what: 'Trajectory length is plausible: < `config.solution.max_trajectory_length` steps; > 1 step (a one-step solution
        is a smell).'
      why: A one-step solution usually means the LLM compressed multi-action work into prose, so the harness can't execute
        it; a runaway-length solution suggests the agent is brute-forcing and the task is under-constrained.
      suggestion: Add a length-range check using `config.solution.{min,max}_trajectory_length` in stage 14's emit validator
        and force re-emit on violation.
      na_reason: This check belongs to Phase 4 — Ship, Stage 14 (Golden solution) and counts the trajectory steps in `task_<id>_solution.yaml`,
        flagging both bloated solutions (> `config.solution.max_trajectory_length`) and suspicious one-step solutions. It
        is not applicable to pure state-set tasks whose solution is a single final-state mutation block with no stepwise trajectory
        to measure.
      code: S14C5
    code: S14
  - name: Stage 15 — Verify + fix
    id: stage_15_verify_fix
    summary: Runs `tests/reward_harness.py` against the compiled rewards using the emitted solution. If any reward fails,
      LLM diagnoses + fixes either the **solution** or the **task definition**, then retries (up to `solution.fix_max_attempts`,
      default 24).
    files:
    - stages/s15_solution_fix.py
    - tests/reward_harness.py
    - gym_github/reward_compiler/`.
    checks:
    - id: final_reward_harness_run_shows_no_waivers_auditor_re
      scope: per-task
      what: Final reward-harness run shows **N/N pass** (no waivers). Auditor re-runs the harness as an independent verification.
      why: Any waived or skipped reward ships an ungraded behavior — the agent can violate it freely in production runs and
        Taiga still marks the task passed, masking model regressions.
      suggestion: Have the auditor re-invoke `tests/reward_harness.py` with `--no-waivers` after stage 15 declares success
        and block ship on anything other than N/N.
      na_reason: This check belongs to Phase 4 — Ship, Stage 15 (Verify + fix) and re-runs `tests/reward_harness.py` against
        the shipped task's compiled rewards using the emitted solution, requiring N/N pass with no waivers. It is not applicable
        when the task's rewards cannot be exercised offline by the harness (for example, they depend on live browser state)
        and are therefore explicitly skipped rather than executed.
      code: S15C1
    - id: attempts_used_burning_the_budget_is_a_quality_smell
      scope: per-task
      what: Attempts used < `solution.fix_max_attempts` — burning the budget is a quality smell flag.
      why: Tasks that consume the full 24-attempt budget usually converge on a degenerate task↔solution pair that compiles
        but no longer tests the original behavior; they pass the harness but fail Taiga QA.
      suggestion: Emit a `HIGH_FIX_ATTEMPTS` warning at >50% budget and quarantine the task for human review before shipping
        rather than auto-promoting it.
      na_reason: This check belongs to Phase 4 — Ship, Stage 15 (Verify + fix) and inspects how many of the `solution.fix_max_attempts`
        (default 24) iterations were consumed before the harness went green, flagging budget-burn as a quality smell. It is
        not applicable when the harness passed on the first attempt, because there is no attempt trajectory to weigh against
        the budget.
      code: S15C2
    - id: diagnosis_classification_across_the_batch_fix_attempts
      scope: per-batch
      what: Diagnosis classification — across the batch, fix attempts split between **task** and **solution** patches roughly
        evenly. Per-task lopsidedness ("always patched the solution") is also a smell.
      why: Always-patch-the-solution behaviour means buggy reward definitions slip through (the LLM bent the golden around
        them); always-patch-the-task means the goldens are wrong and we're eroding task intent to match them.
      suggestion: Log every fix's `patch_target` in stage 15 and alert when per-task or per-batch ratios skew past, e.g.,
        80/20 — surface in the audit report.
      code: S15C3
    - id: no_regression_rewards_that_passed_in_attempt_n_must
      scope: per-task
      what: No regression — rewards that passed in attempt N must still pass in attempt N+1; auditor checks for pass→fail
        flips across fix iterations.
      why: A pass→fail flip means a later fix broke an earlier-validated reward; if the loop terminates on a different green
        set, the shipped task doesn't actually satisfy what stage 15 once verified, and goldens are unsound.
      suggestion: Track per-reward pass history across attempts in the harness driver and hard-fail the loop on any regression
        instead of just retrying.
      na_reason: This check belongs to Phase 4 — Ship, Stage 15 (Verify + fix) and walks the per-attempt harness logs to ensure
        no reward that passed in attempt N regressed to failing in attempt N+1 as the LLM patched either the solution or the
        task. It is not applicable when the task converged in a single attempt, because there is no N→N+1 transition for a
        regression to occur in.
      code: S15C4
    - id: both_files_are_written_atomically_auditor_checks
      scope: per-task
      what: Both files (`generated/task_<id>.yaml` + `task_data/solutions/task_<id>_solution.yaml`) are written atomically;
        auditor checks mtimes to confirm they were updated in lock-step.
      why: If only the task or only the solution gets written, the next regen runs stage 15 against a stale counterpart —
        verify passes locally but Taiga sees a task/solution mismatch and the golden trajectory grades wrong.
      suggestion: Write both files via a tmp-then-rename pair guarded by a single try/except in the stage 15 writer and assert
        matching mtimes (±1s) in the auditor.
      na_reason: This check belongs to Phase 4 — Ship, Stage 15 (Verify + fix) and compares the mtimes of `generated/task_<id>.yaml`
        and `task_data/solutions/task_<id>_solution.yaml` to confirm the fix step rewrote them in lock-step. It is not applicable
        when Stage 15 made no edits — the harness passed on the first try — so neither file was rewritten and there is no
        atomic-write pairing to verify.
      code: S15C5
    code: S15
- name: Runtime — In-container instantiation
  id: runtime_in_container_instantiation
  corpus: shipped
  corpus_path: task-designer/worlds/
  stages:
  - name: R1 — Load task
    id: r1_load_task
    summary: Reads the task definition; resolves `definition.yaml` or the consolidated `tasks_world.json`.
    files:
    - gym_github/task_loading.py
    - gym_github/task.py`.
    checks:
    - id: matches_the_source_filename_or_the_manifest_key_no
      scope: per-task
      what: '`task.id` matches the source filename or the manifest key — no name drift.'
      why: If `task.id` drifts from its filename/manifest key, snapshot lookups and replay harnesses key off the wrong row
        — graders score task A while the orchestrator thinks it ran task B, producing silent cross-contamination.
      suggestion: In the loader (taiga_transport / pgym_transport), assert `task.id == basename(path)` or `task.id == manifest_key`
        immediately after `Task.model_validate`.
      na_reason: This runtime check (R1 — Load task, in gym_github/task_loading.py) compares the loaded task's `id` field
        against either its source filename (e.g. `task_042_foo.yaml`) or its key in a consolidated manifest, to catch name
        drift. It is N/A when a task is loaded from a packed corpus that exposes neither a per-task filename nor a manifest
        key — for example, an inline test fixture or an in-memory dict passed straight to the loader — so there is no external
        identifier to compare `task.id` against.
      code: R1C1
      script: audit/scripts/r1_load_task.py::task_id_matches_source_filename
    - id: every_reward_is_in_the_gym_s_registered_closed_reward
      scope: per-task
      what: Every reward `kind` is in the gym's registered closed reward universe.
      why: An unregistered `kind` falls through the dispatcher, gets dropped from the reward list, and the agent silently
        earns a higher pass rate because a real check was never executed.
      suggestion: Validate every `reward.kind` against `gym_github.rewards`'s `@register` table at load time and raise instead
        of warn.
      na_reason: This R1 check walks the task's `rewards:` list and verifies each entry's `kind` appears in the gym's registered
        reward universe (the closed set wired up in gym_github/rewards.py). It is N/A for tasks that declare zero rewards
        — probe-only fixtures, scaffolding tasks, or smoke-test stubs — because there are no `kind` strings to validate against
        the registry.
      code: R1C2
      script: audit/scripts/r1_load_task.py::every_reward_kind_in_registered_closed_set
    - id: all_strings_exist_in_the_gym_s_registered_tool_catalog
      scope: per-task
      what: All `tools:` strings exist in the gym's registered tool catalog.
      why: Unknown tool names in `tools:` either silently expose nothing (agent can't act) or get wildcarded through, letting
        the agent invoke tools the task author never intended — both produce broken trajectories.
      suggestion: Intersect `task.tools` with `mcp_server`'s registered tool names at load and fail closed on any miss.
      na_reason: This R1 check reads the task's `tools:` block and confirms every named tool exists in the gym's registered
        MCP tool catalog (the tools exposed by gym_github/mcp_server.py). It is N/A when a task omits the `tools:` block entirely
        and inherits the gym's default tool set — there is no explicit list to cross-check, so the catalog-membership question
        doesn't arise.
      code: R1C3
    - id: every_bootstrap_identity_e_g_agent_user_resolves_to_a
      scope: per-task
      what: Every bootstrap identity (e.g. agent user) resolves to a declared entity in the world.
      why: If the bootstrap user/org/repo doesn't exist in the world block, R2 seeds a world the agent has no credentials
        in — every action 401s and the trajectory looks like a refusal rather than a real attempt.
      suggestion: After parsing `bootstrap_data`, cross-check each identity reference against the `world:` entity maps and
        abort the task before R2 runs.
      na_reason: This R1 check inspects the task's bootstrap identity declaration (the agent-user block consumed during task
        setup) and confirms each referenced identity resolves to a real entity declared in the world. It is N/A for tasks
        that declare no bootstrap identity — anonymous tasks, or tasks that run as the gym's shared-default agent user — because
        there is no identity reference to resolve.
      code: R1C4
      script: audit/scripts/r1_load_task.py::bootstrap_identity_resolves
    - id: loading_is_deterministic_same_task_id_returns_byte
      scope: per-stage
      what: 'Loading is deterministic: same task ID returns byte-identical Task across calls.'
      why: Non-deterministic loading (e.g. dict iteration order, time-based defaults) means goldens recorded yesterday won't
        replay today, and regen diffs become unreviewable noise.
      suggestion: Load → canonical JSON dump twice in CI and `assert hash(a) == hash(b)`; sort keys and pin any `datetime.now()`
        calls.
      code: R1C5
    code: R1
  - name: R2 — Build the world
    id: r2_build_the_world
    summary: '`WorldBuilder` validates the `world:` block into a `WorldState`, wipes/lays-on-top of the DB per `seed_base`,
      INSERTs all rows, `git init`s repos, creates branches, snapshots per-table checksums.'
    files:
    - gym_github/world_schema.py
    - gym_github/world_builder.py`.
    checks:
    - id: post_build_resource_counts_db_rows_files_services_etc
      scope: per-task
      what: Post-build resource counts (DB rows, files, services, etc.) match the world declaration per kind.
      why: If declared rows ≠ inserted rows, downstream `no_extra_*` guards trip on phantom rows the author never declared,
        and `accounted_by` carve-outs miss real entities — both produce broken goldens.
      suggestion: In `WorldBuilder.build()`, after INSERTs, `SELECT COUNT(*)` per kind and assert against `len(world.<kind>s)`.
      na_reason: This R2 check (gym_github/world_builder.py) compares post-build resource counts — DB rows, file-tree entries,
        declared services — against the per-kind counts in the task's `world:` block. It is N/A for tasks that ship with no
        `world:` declaration and instead reuse the gym's stock seed database; with no declared counts there is no expected
        value to compare the materialized world against.
      code: R2C1
    - id: the_post_seed_snapshot_store_exists_and_has_one_entry
      scope: per-task
      what: The post-seed snapshot store exists and has one entry per audited resource container.
      why: Missing snapshot entries mean R4's reward compiler can't compute pre-state checksums, so guards like `no_extra_issues`
        can't distinguish pre-existing rows from agent writes — agent gets free credit for the seed.
      suggestion: After seeding, assert `len(snapshot_store) == len(audited_kinds)` and emit a manifest log line for each
        container.
      na_reason: This R2 check verifies that WorldBuilder produced a post-seed snapshot store with one entry per audited resource
        container — the per-table checksums that downstream carve-out/freeze guards diff against. It is N/A when none of the
        task's rewards rely on snapshot diffing (no `no_extra_*` guards, no freeze checks, no "only the touched row changed"
        assertions), so the snapshot infrastructure isn't required.
      code: R2C2
    - id: per_item_checksums_present_not_just_aggregate_hashes
      scope: per-task
      what: Per-item checksums present (not just aggregate hashes) — required for carve-out freezes downstream.
      why: Aggregate-only hashes can't carve out a single seeded row from agent-created rows at grade time — the guard either
        passes everything or fails everything, killing precision.
      suggestion: 'Persist `{entity_id: sha256(canonical_repr)}` rows alongside the aggregate; gate emission on per-item presence
        in the snapshot writer.'
      na_reason: This R2 check ensures the post-seed snapshot stores per-row (not just per-table aggregate) checksums, which
        carve-out freeze guards need to prove that untouched rows stayed identical. It is N/A for tasks with no carve-out
        or freeze guards downstream — an aggregate hash suffices, and per-item granularity buys nothing the rewards will actually
        consume.
      code: R2C3
    - id: agent_identity_has_the_permissions_required_to_act_on
      scope: per-task
      what: Agent identity has the permissions required to act on every target resource (per `agent_permission_seeding` rubric
        check).
      why: If the agent user lacks write/admin on the target repo or membership in the target org, every reward-relevant tool
        call 403s — trajectory shows refusal-looking failures and goldens cannot pass.
      suggestion: After seeding, run a permission probe (or check `repo_collaborators` / `org_members` rows) for the bootstrap
        user against each reward-target entity.
      na_reason: This R2 check verifies the seeded agent identity holds the GitHub-style permissions (write, admin, collaborator)
        needed to mutate every resource its rewards target — the runtime mirror of the `agent_permission_seeding` rubric check.
        It is N/A for read-only, navigation, or QA tasks where the agent never performs mutations, so no write permissions
        need to be seeded or verified.
      code: R2C4
    - id: every_external_resource_declared_in_the_world_repos
      scope: per-task
      what: Every external resource declared in the world (repos, services, file trees, datasets) is materialized at the expected
        path and reachable through the gym's standard accessor.
      why: If a declared repo isn't `git init`ed, or a file tree isn't materialized on disk, the agent's browser/CLI sees
        a 404 — golden replays fail not because logic broke but because the world never finished setting up.
      suggestion: After R2, walk each declared resource and assert `os.path.exists(...)` / HTTP 200 via the gym's standard
        accessor before returning the prompt.
      na_reason: This R2 check confirms that every external resource declared in `world:` (git repos at /tmp/.git-server,
        services, file trees, mounted datasets) is actually materialized on disk and reachable through the gym's standard
        accessor. It is N/A for DB-only worlds — tasks whose `world:` block declares only SQLite rows with no repos, services,
        or file trees — because there are no external resources to materialize or reach.
      code: R2C5
    - id: build_is_idempotent_under_a_wipe_then_seed_base
      scope: per-stage
      what: Build is idempotent under a "wipe then seed" base — running twice produces identical checksums.
      why: Non-idempotent builds mean retrying a flaky setup leaves residue (extra rows, stale branches), so guards trip on
        yesterday's leftovers and the same task ID grades differently across runs.
      suggestion: 'In CI, run `build()` twice with `seed_base: wipe` and diff `snapshot_store` — they must be byte-identical;
        fix non-deterministic inserts (auto IDs, timestamps).'
      code: R2C6
    code: R2
  - name: R3 — Substitute IDs
    id: r3_substitute_ids
    summary: '`substitute_world_ids` walks the *entire* task dict (rewards, prompt, bootstrap_data, evidence) replacing `$world${...}`,
      `$world_number${...}`, `$next_number${...}` with live values from the maps built in R2.'
    files:
    - gym_github/world_builder.py:substitute_world_ids`.
    checks:
    - id: post_substitution_scan_zero_of_the_gym_s_substitution
      scope: per-task
      what: 'Post-substitution scan: zero of the gym''s substitution tokens survive in the task dict.'
      why: A surviving `$world${...}` token gets treated as a literal string at grade time, so SQL predicates compare against
        the raw template and silently fail — agent loses points for grader bugs.
      suggestion: After `substitute_world_ids`, grep the serialized task dict for `$world`, `$world_number`, `$next_number`
        and raise if any remain.
      na_reason: This R3 check (gym_github/world_builder.py:substitute_world_ids) re-scans the fully substituted task dict
        and asserts zero `$world${...}`, `$world_number${...}`, or `$next_number${...}` tokens survive — a leftover token
        means a substitution slot was missed. It is N/A for tasks that author no substitution tokens at all (everything is
        a literal value), so there is nothing for the post-scan to find or miss.
      code: R3C1
    - id: every_substituted_value_maps_to_a_valid_runtime_id
      scope: per-task
      what: Every substituted value maps to a valid runtime ID (UUID, integer, etc.) — no `None`, no `null` strings.
      why: If a substitution map returns `None` (typo, missing entity), the placeholder becomes the literal string `"None"`
        and predicates compare UUID columns to that string — all goldens silently fail.
      suggestion: In the substitution walker, assert each resolved value is a non-empty `str/int/UUID` and raise with the
        offending token path.
      na_reason: This R3 check confirms every value written in by `substitute_world_ids` is a valid runtime identifier — a
        real UUID or integer from the maps built in R2, never `None` or the literal string `"null"`. It is N/A for tasks that
        perform no ID substitution at all (rewards, prompt, and evidence reference only static literal IDs), so the substitution
        map is never consulted and there are no inserted values to validate.
      code: R3C2
    - id: substitution_walks_the_full_tree_auditor_checks
      scope: per-task
      what: Substitution walks the full tree — auditor checks recursion-depth log against expected (catches "only top-level
        got substituted").
      why: A shallow walker substitutes only top-level reward fields and leaves placeholders nested inside `assertions.expected`
        or `evidence` — graders compare live IDs against templates and produce false negatives.
      suggestion: Have the walker emit a recursion-depth log; assert depth ≥ max depth observed in the source task dict (or
        instrument with a counter and compare).
      na_reason: This R3 check inspects the recursion depth recorded by `substitute_world_ids` to confirm it walked the entire
        task tree, catching regressions where only top-level keys got substituted while nested rewards/evidence were skipped.
        It is N/A for tasks whose substitution tokens all sit at top-level keys — the walker never needs to recurse deeply,
        so the depth-log signal carries no information.
      code: R3C3
    - id: substitutions_are_non_empty_when_rewards_use
      scope: per-task
      what: '`task.prompt` substitutions are non-empty when rewards use placeholders (catches a prompt-side regression where
        the substitution skipped the prompt).'
      why: If rewards reference `$world${repo.id}` but the prompt still says "the repo `$world${repo.id}`", the agent sees
        a literal placeholder string, gets confused, and tries to navigate to that URL — task is unsolvable.
      suggestion: After substitution, scan `task.prompt` for the same tokens used by rewards and assert they're all resolved
        (or that none survive).
      na_reason: This R3 check guards against a regression where `task.prompt` is skipped by the substitution walker — it
        asserts the post-substitution prompt is non-empty whenever rewards use placeholders that should also appear in the
        prompt. It is N/A when the prompt contains no substitution placeholders to begin with (purely static prompt text),
        so the prompt-side walker has nothing to fail at.
      code: R3C4
    code: R3
  - name: R4 — Compile rewards
    id: r4_compile_rewards
    summary: Each declarative `check:` reward is dispatched through the `@register` registry to a per-kind compiler (`issue`,
      `pr`, `commit`, `file`, `wiki`, `state`, `misc`, `guards`). The compiler emits SQL + Python predicates the grader can
      execute.
    files:
    - gym_github/reward_compiler/__init__.py
    - gym_github/reward_compiler/compilers/*.py
    - gym_github/reward_compiler/registry.py`.
    checks:
    - id: every_reward_kind_in_the_input_is_dispatched_count_of
      scope: per-task
      what: Every reward kind in the input is dispatched (count of registry hits == reward count).
      why: If the dispatcher silently skips an unknown kind, the compiled reward list is shorter than the declared list —
        grade time runs fewer checks than the author wrote, inflating pass rate.
      suggestion: In the compiler driver, assert `len(compiled) == len(task.rewards)` after dispatch; fail loud rather than
        logging a skip.
      na_reason: 'This R4 check (gym_github/reward_compiler/registry.py) confirms each declarative `check:` reward got dispatched
        to its per-kind compiler — the registry-hit count should equal the input reward count. It is N/A for tasks that declare
        zero declarative `check:` rewards, e.g. tasks using only `kind: action` or `kind: answer` rewards that bypass the
        compiler registry entirely.'
      code: R4C1
    - id: compiled_output_is_auditor_compiles_dry_runs_each
      scope: per-task
      what: 'Compiled output is **executable**: auditor compiles + dry-runs each predicate against the live snapshot and checks
        for runtime errors (analog of `compiled_output_executes`).'
      why: A syntactically valid compiled predicate can still raise `OperationalError` at runtime (bad column name, malformed
        CASE) — the grader catches it as a 0.0 score, so agents lose points to compiler bugs.
      suggestion: In CI, after R4 emit, run each predicate against the R2 snapshot with `EXPLAIN` (SQL) or `eval` (Python)
        and assert no exceptions.
      na_reason: This R4 check (gym_github/reward_compiler/compilers/*.py) dry-runs each compiled predicate — the SQL queries
        and Python lambdas the compilers emit — against the live R2 snapshot and flags runtime errors. It is N/A for tasks
        whose rewards emit no executable predicates, most commonly pure NL-judge rewards that ship a prompt to a model rather
        than a query to the database.
      code: R4C2
    - id: mutual_exclusion_sets_are_pairwise_disjoint_for
      scope: per-task
      what: Mutual exclusion sets are pairwise disjoint for sibling verbs on the same entity (per `mutual_exclusion_between_checks`).
      why: Overlapping mutex verbs (e.g. `closed` and `merged` both matching the same PR) cause guards to double-count, so
        the agent can either earn duplicate credit or fail an unsatisfiable conjunction.
      suggestion: In `reward_pair_linter` (or the compiler's mutex stage), enumerate sibling verbs per entity and assert the
        produced ID sets are pairwise disjoint.
      na_reason: This R4 check verifies that sibling verbs acting on the same entity (e.g. `issue.opened` vs `issue.closed`
        on the same issue) compile to pairwise-disjoint predicate sets, so the same world state can't satisfy contradictory
        rewards. It is N/A when the task's reward suite has no sibling verbs on a shared entity — single-verb suites, or suites
        where each verb targets a different entity, have nothing to be mutually exclusive about.
      code: R4C3
    - id: populated_for_every_guard_targeting_a_write_table
      scope: per-task
      what: '`accounted_by` populated for every `no_extra_*` guard targeting a write-table.'
      why: Without `accounted_by`, `no_extra_*` guards see seeded rows as agent-written and falsely fail; or carve-outs are
        too broad and the agent gets free credit for noise rows.
      suggestion: In `guards`/`accounted_by_type_linter`, require every `no_extra_<table>` reward to enumerate the set of
        sibling rewards/seeds that legitimize each row.
      na_reason: This R4 check ensures every `no_extra_*` guard (which forbids untouched rows from changing in a write-table)
        carries an `accounted_by` list naming which positive rewards are allowed to cause writes. It is N/A for tasks that
        declare no `no_extra_*` guards — pure read-only tasks, or tasks that intentionally leave the write surface unconstrained
        — because the `accounted_by` field only attaches to that guard family.
      code: R4C4
    - id: compilation_is_compile_twice_and_diff
      scope: per-stage
      what: 'Compilation is **deterministic**: compile twice and diff (`compiler_output_determinism`).'
      why: Non-deterministic compilation (set ordering, dict iteration) means today's compiled predicate diffs against yesterday's,
        so reviewers can't tell whether a real change broke something or it's just churn.
      suggestion: Add a `compiler_output_determinism` CI step that runs the compiler twice on the same task and diffs the
        canonical JSON — fail on any delta.
      code: R4C5
    - id: when_every_reward_has_a_non_empty_evidence_block_else
      scope: per-task
      what: 'When `evidence_strict: true`, every reward has a non-empty evidence block — else emission fails.'
      why: Under `evidence_strict`, a missing evidence block means QA can't trace why a reward scored as it did, and the leakage
        linter can't verify the answer isn't directly readable from the seeded world.
      suggestion: In the compiler's emission gate, when `task.evidence_strict`, assert each reward has `evidence:` with ≥1
        anchor and raise the offending reward name.
      na_reason: 'This R4 check enforces `evidence_strict: true` semantics: when the task opts into strict mode, every compiled
        reward must carry a non-empty evidence block or compilation fails. It is N/A for tasks running with `evidence_strict:
        false` (the default for legacy or evidence-optional tasks), where rewards may legally compile without evidence anchors.'
      code: R4C6
    code: R4
  - name: R5 — Agent runs, then grade
    id: r5_agent_runs_then_grade
    summary: Agent drives the browser. On `grade_problem`, the gym rebuilds the trajectory from `/tmp/taiga_github_adapter/tool_calls.jsonl`
      + the trailing assistant text, runs every compiled reward against live DB state, packages a `Grade` payload.
    files:
    - gym_github/server.py
    - gym_github/taiga_transport.py
    - gym_github/rewards.py`.
    checks:
    - id: subscore_count_reward_count_no_rewards_silently
      scope: per-task
      what: Subscore count == reward count (no rewards silently dropped at grade time).
      why: If the grader drops a reward (exception swallowed, missing predicate), the final pass/fail ratio is wrong — a 4/5
        grade reported as 4/4 hides a real failure.
      suggestion: In `grade_problem`, assert `len(subscores) == len(task.rewards)` before packaging the `Grade` payload; raise
        rather than truncate.
      na_reason: 'This R5 check (gym_github/server.py grading path) confirms the `Grade` payload returned to Taiga contains
        exactly one subscore per declared reward — no silent drops between R4 compilation and runtime grading. It is N/A for
        tasks that never reach the grader at all: container crashes during R2/R3, setup failures, or hard agent timeouts produce
        no `Grade` payload, so there are no subscores to count.'
      code: R5C1
    - id: every_score_0_0_1_0_no_nan_no_fractional_no_missing
      scope: per-task
      what: Every score ∈ {0.0, 1.0}; no NaN, no fractional, no missing.
      why: Fractional or NaN scores break Taiga's downstream aggregation (expects boolean checks) and surface as ambiguous
        QA states — reviewers can't tell pass from partial credit.
      suggestion: After each reward fires, coerce to `{0.0, 1.0}` and `assert score in (0.0, 1.0)` in the grader; treat anything
        else as a hard failure.
      na_reason: 'This R5 check enforces the gym''s pass/fail discipline: every reward score must be exactly 0.0 or 1.0, with
        no NaN, no fractional values, and no missing entries. It is N/A for tasks that deliberately emit fractional or weighted
        scores — for example, partial-credit NL-judge rewards or weighted rubric scorers — where non-binary outputs are intentional
        rather than a bug.'
      code: R5C2
    - id: every_failing_reward_carries_a_non_empty_message_so_qa
      scope: per-task
      what: Every failing reward carries a non-empty `failing_details` message (so QA can triage).
      why: Empty `failing_details` leaves QA unable to triage — they can't tell whether the agent skipped the action, the
        predicate is buggy, or the seed was wrong, so the finding becomes unactionable.
      suggestion: In each `RewardFunction.__call__`, on score=0.0 require a non-empty `failing_details` and assert it before
        returning.
      na_reason: This R5 check inspects the grade payload's `failing_details` field for each reward that scored 0.0, requiring
        a non-empty diagnostic string so QA can triage why the reward failed. It is N/A for runs where every reward passed
        (a clean 1.0 across the board), because no failure messages were ever generated and there is nothing to inspect.
      code: R5C3
    - id: grade_payload_schema_validates_against_the_taiga
      scope: per-task
      what: Grade payload schema validates against the Taiga contract (no extra fields, all required fields present).
      why: Extra or missing fields cause Taiga's ingestion to drop the row or reject the job — the task ran fine but the result
        never reaches QA, so it looks like a flaky timeout.
      suggestion: Validate the `Grade` dict against the Taiga pydantic schema (or `model_validate`) just before returning
        from `grade_problem`.
      na_reason: This R5 check validates the final `Grade` payload (assembled in gym_github/taiga_transport.py) against the
        Taiga contract — required fields present, no extra fields, correct types. It is N/A when a task is graded through
        a different transport, e.g. a local PGym run via `gym_github/pgym_transport.py` that emits the PGym shape instead
        of the Taiga shape, so the Taiga schema doesn't apply.
      code: R5C4
    - id: re_grading_the_same_trajectory_yields_identical_scores
      scope: per-stage
      what: Re-grading the same trajectory yields identical scores — grader determinism.
      why: Non-deterministic grading (e.g. live timestamps in SQL, LLM judge without temperature 0) means QA sees flapping
        scores on the same trajectory and can't trust pass/fail signals.
      suggestion: Add a CI step that grades a canned trajectory twice and diffs scores + failing_details; freeze any `now()`/random
        seeds in predicates.
      code: R5C5
    - id: when_agent_s_golden_solution_is_replayed_expect_n_n
      scope: per-task
      what: When agent's golden solution is replayed, expect N/N pass (this is the runtime mirror of stage-15's harness check).
      why: If the golden replay doesn't score N/N, the task is unsolvable as authored — every real agent attempt fails for
        reasons unrelated to the agent's ability, polluting the pass-rate signal.
      suggestion: Wire `make verify-goldens` (or the harness equivalent) to replay each task's recorded golden trajectory
        and assert all subscores are 1.0.
      na_reason: This R5 check replays the recorded golden-solution trajectory (the runtime mirror of Stage 15's harness verification)
        and expects every reward to pass, proving the task is solvable end-to-end. It is N/A for tasks that shipped without
        a recorded golden solution YAML in task_data/solutions/ — there is no trajectory to replay, so the round-trip check
        can't run.
      code: R5C6
    code: R5
